<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RapidType - Typing Speed Test</title>
  <link rel="stylesheet" href="index_style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="container">
      <h1>Welcome to RapidType</h1>
      <p class="subtitle">Select a difficulty level to start the test:</p>

      <div class="difficulty-buttons">
        <button class="easy" onclick="startGame('easy')"><span>Easy</span></button>
        <button class="medium" onclick="startGame('medium')"><span>Medium</span></button>
        <button class="hard" onclick="startGame('hard')"><span>Hard</span></button>
      </div>

      <div class="main-actions">
        <button id="view-stats-btn" class="view-stats-btn">View Stats</button>
        <button id="settings-btn" class="settings-btn">Settings</button>
      </div>
    </div>
  </div>

  <div class="settings-modal hidden" id="settings-modal">
    <div class="settings-content">
      <h2>Settings</h2>

      <div class="settings-section">
        <h3>Test Settings</h3>
          <div class="setting-item">
            <label>
              <input type="radio" name="view-mode" value="paragraph" checked />
              Paragraph view
            </label>
          </div>
          <div class="setting-item">
            <label>
              <input type="radio" name="view-mode" value="classic" />
              Classic view
            </label>
          </div>
      </div>

      <div class="settings-section">
        <h3>Visuals</h3>
        <div class="setting-item">
          <label>
            <input type="checkbox" id="dark-mode-toggle-setting" />
            Dark mode
          </label>
        </div>
        <div class="setting-item">
          <label>
            <input type="checkbox" id="show-results-toggle" />
            Show results popup
          </label>
        </div>
      </div>

      <div class="settings-buttons">
        <button id="save-settings-btn" class="save-settings-btn">Save Settings</button>
        <button id="close-settings-btn">Close</button>
      </div>
    </div>
  </div>

  <div class="stats-modal hidden" id="stats-modal">
    <div class="stats-content">
      <h2>Your Typing Stats</h2>

      <div id="stats-summary">
        <div class="summary-item">
          <strong>High Score:</strong> <span id="high-score">0</span>
        </div>
        <div class="summary-item">
          <strong>Average Score:</strong> <span id="avg-score">0</span>
        </div>
      </div>

      <div class="difficulty-filter">
        <label><input type="checkbox" value="easy" class="difficulty-checkbox" checked /> Easy</label>
        <label><input type="checkbox" value="medium" class="difficulty-checkbox" checked /> Medium</label>
        <label><input type="checkbox" value="hard" class="difficulty-checkbox" checked /> Hard</label>
        <label><input type="checkbox" id="perfect-game-checkbox" class="filter-checkbox" /> Perfect Games</label>
      </div>

      <div id="stats-list"></div>

      <div class="stats-buttons">
        <button id="delete-all-stats-btn" class="delete-all-btn">Delete All Stats</button>
        <button id="close-stats-btn">Close</button>
      </div>
    </div>
  </div>

  <div class="confirm-modal hidden" id="confirm-modal">
    <div class="confirm-content">
      <h3 id="confirm-title">Confirm Deletion</h3>
      <p id="confirm-message">Type to confirm deletion:</p>
      <input type="text" id="confirm-input" placeholder="Type here..." />
      <div class="confirm-buttons">
        <button id="confirm-delete-btn" class="confirm-delete-btn">Delete</button>
        <button id="cancel-delete-btn" class="cancel-delete-btn">Cancel</button>
      </div>
    </div>
  </div>

  <div class="footer" id="footertext">
    <p class="rainbow rainbow_text_animated">Made by Rares Racsan</p>
    <p class="rainbow rainbow_text_animated">Fork by Xionlucitx</p>
  </div>




  <script>
    function startGame(level) {
      window.location.href = `test.html?difficulty=${level}`;
    }

    // Stats modal
    const viewStatsBtn = document.getElementById('view-stats-btn');
    const statsModal = document.getElementById('stats-modal');
    const statsList = document.getElementById('stats-list');
    const closeStatsBtn = document.getElementById('close-stats-btn');
    const deleteAllStatsBtn = document.getElementById('delete-all-stats-btn');
    const highScoreSpan = document.getElementById('high-score');
    const avgScoreSpan = document.getElementById('avg-score');
    const difficultyCheckboxes = document.querySelectorAll('.difficulty-checkbox');
    const perfectGameCheckbox = document.getElementById('perfect-game-checkbox');
    const confirmModal = document.getElementById('confirm-modal');
    const confirmInput = document.getElementById('confirm-input');
    const confirmDeleteBtn = document.getElementById('confirm-delete-btn');
    const cancelDeleteBtn = document.getElementById('cancel-delete-btn');
    const confirmTitle = document.getElementById('confirm-title');
    const confirmMessage = document.getElementById('confirm-message');

    let pendingDeleteAction = null;
    let pendingDeleteIndex = null;
    const DELETE_RECORD_TEXT = 'delete record';
    const DELETE_ALL_TEXT = 'delete all stats';

    function getSelectedDifficulties() {
      return Array.from(difficultyCheckboxes)
        .filter(cb => cb.checked)
        .map(cb => cb.value);
    }

    function updateStatsDisplay() {
      const results = JSON.parse(localStorage.getItem('typingTestResults') || '[]');
      const selectedDifficulties = getSelectedDifficulties();
      const showPerfectOnly = perfectGameCheckbox.checked;

      let filteredResults = results.filter(r => selectedDifficulties.includes(r.difficulty));

      if (showPerfectOnly) {
        filteredResults = filteredResults.filter(r => r.isPerfectGame === true);
      }

      if (results.length === 0) {
        statsList.innerHTML = '<p>No test results yet.</p>';
        highScoreSpan.textContent = '0';
        avgScoreSpan.textContent = '0';
      } else if (filteredResults.length === 0) {
        statsList.innerHTML = '<p>No results for selected filters.</p>';
        highScoreSpan.textContent = '0';
        avgScoreSpan.textContent = '0';
      } else {
        const scores = filteredResults.map(r => r.score || 0);
        const highScore = Math.max(...scores);
        const avgScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);

        highScoreSpan.textContent = highScore;
        avgScoreSpan.textContent = avgScore;

        statsList.innerHTML = filteredResults.map((result) => {
          const originalIndex = results.indexOf(result);
          const dateOnly = new Date(result.timestamp).toLocaleDateString();
          const isHighScore = result.score === highScore;
          const starIcon = isHighScore ? ' ⭐' : '';
          const isPerfect = result.isPerfectGame ? ' class="perfect-accuracy"' : '';

          return `
            <div class="stat-item">
              <div class="stat-info">
                <strong>${result.difficulty.toUpperCase()}</strong> - ${dateOnly}<br>
                WPM: ${result.wpm} | CPM: ${result.cpm} | Accuracy: <span${isPerfect}>${result.accuracy}%</span> | Score: ${result.score || 'N/A'}${starIcon}
              </div>
              <button class="delete-stat-btn" onclick="deleteStatResult(${originalIndex})">Delete</button>
            </div>
          `;
        }).join('');
      }
    }

    window.deleteStatResult = function(index) {
      pendingDeleteAction = 'single';
      pendingDeleteIndex = index;
      confirmTitle.textContent = 'Delete Record?';
      confirmMessage.textContent = `Type "${DELETE_RECORD_TEXT}" to confirm:`;
      confirmInput.value = '';
      confirmInput.placeholder = DELETE_RECORD_TEXT;
      confirmModal.classList.remove('hidden');
      confirmInput.focus();
    };

    viewStatsBtn.addEventListener('click', () => {
      updateStatsDisplay();
      statsModal.classList.remove('hidden');
    });

    difficultyCheckboxes.forEach(checkbox => {
      checkbox.addEventListener('change', updateStatsDisplay);
    });

    perfectGameCheckbox.addEventListener('change', updateStatsDisplay);

    deleteAllStatsBtn.addEventListener('click', () => {
      pendingDeleteAction = 'all';
      confirmTitle.textContent = 'Delete All Stats?';
      confirmMessage.textContent = `Type "${DELETE_ALL_TEXT}" to confirm:`;
      confirmInput.value = '';
      confirmInput.placeholder = DELETE_ALL_TEXT;
      confirmModal.classList.remove('hidden');
      confirmInput.focus();
    });

    confirmDeleteBtn.addEventListener('click', () => {
      const inputValue = confirmInput.value.trim().toLowerCase();

      if (pendingDeleteAction === 'single') {
        if (inputValue === DELETE_RECORD_TEXT) {
          const results = JSON.parse(localStorage.getItem('typingTestResults') || '[]');
          results.splice(pendingDeleteIndex, 1);
          localStorage.setItem('typingTestResults', JSON.stringify(results));
          updateStatsDisplay();
          confirmModal.classList.add('hidden');
          pendingDeleteAction = null;
          pendingDeleteIndex = null;
        } else {
          confirmInput.style.borderColor = 'red';
          setTimeout(() => { confirmInput.style.borderColor = ''; }, 1000);
        }
      } else if (pendingDeleteAction === 'all') {
        if (inputValue === DELETE_ALL_TEXT) {
          localStorage.setItem('typingTestResults', '[]');
          updateStatsDisplay();
          confirmModal.classList.add('hidden');
          pendingDeleteAction = null;
        } else {
          confirmInput.style.borderColor = 'red';
          setTimeout(() => { confirmInput.style.borderColor = ''; }, 1000);
        }
      }
    });

    cancelDeleteBtn.addEventListener('click', () => {
      confirmModal.classList.add('hidden');
      pendingDeleteAction = null;
      pendingDeleteIndex = null;
      confirmInput.value = '';
    });

    confirmInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        confirmDeleteBtn.click();
      }
    });

    closeStatsBtn.addEventListener('click', () => {
      statsModal.classList.add('hidden');
    });

    // Settings modal
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const closeSettingsBtn = document.getElementById('close-settings-btn');
    const saveSettingsBtn = document.getElementById('save-settings-btn');
    const darkModeToggleSetting = document.getElementById('dark-mode-toggle-setting');
    const showResultsToggle = document.getElementById('show-results-toggle');
    const viewModeRadios = document.querySelectorAll('input[name="view-mode"]');
    const body = document.body;

   function loadSettings() {
    const settings = JSON.parse(localStorage.getItem('typingTestSettings') || '{}');

     let viewMode = settings.viewMode || 'paragraph';

      if (viewMode === 'vertical') viewMode = 'paragraph';
      if (viewMode === 'horizontal') viewMode = 'classic';

      const darkMode = settings.darkMode || false;
      const showResults = settings.showResults !== false;

      viewModeRadios.forEach(radio => {
        radio.checked = radio.value === viewMode;
      });

      darkModeToggleSetting.checked = darkMode;
      showResultsToggle.checked = showResults;

      applySettings({
        ...settings,
        viewMode
      });
}

    function saveSettings() {
      const viewMode = document.querySelector('input[name="view-mode"]:checked').value;
      const darkMode = darkModeToggleSetting.checked;
      const showResults = showResultsToggle.checked;

      const settings = {
        viewMode,
        darkMode,
        showResults
      };

      localStorage.setItem('typingTestSettings', JSON.stringify(settings));
      applySettings(settings);
}
      function applySettings(settings) {
        if (settings.darkMode) {
          body.classList.add('dark');
        } else {
          body.classList.remove('dark');
        }

        let viewMode = settings.viewMode || 'paragraph';

        if (viewMode === 'vertical') viewMode = 'paragraph';
        if (viewMode === 'horizontal') viewMode = 'classic';

        localStorage.setItem('viewMode', viewMode);
      }

    settingsBtn.addEventListener('click', () => {
      loadSettings();
      settingsModal.classList.remove('hidden');
    });

    closeSettingsBtn.addEventListener('click', () => {
      settingsModal.classList.add('hidden');
    });

    saveSettingsBtn.addEventListener('click', () => {
      saveSettings();
      settingsModal.classList.add('hidden');
      alert('Settings saved!');
    });

    loadSettings();
  </script>
</body>
</html>
